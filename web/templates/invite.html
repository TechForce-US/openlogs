{{define "content"}}
<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">◆ OpenLogs</h1>
    {{if .Data.Invalid}}
      <p class="invite-invalid-msg">This invite link is invalid, has expired, or has already been used.</p>
      <a class="invite-back-link" href="/login">Go to login</a>
    {{else}}
      <p class="invite-subtitle">Set a password to create your account.</p>
      <form method="post" action="/invite/{{.Data.Token}}" class="stacked">
        <label>New password
          <input type="password" name="new_password" autocomplete="new-password" required autofocus minlength="8">
        </label>
        <label>Confirm password
          <input type="password" name="confirm_password" autocomplete="new-password" required minlength="8">
        </label>
        <button type="submit">Create account</button>
      </form>
    {{end}}
  </div>
</div>
{{end}}
