{{define "log-detail"}}<div class="log-detail">{{if hasData .Context}}<div class="detail-block"><h4>Context</h4><pre>{{prettyJSON .Context}}</pre></div>{{end}}{{if hasData .Extra}}<div class="detail-block"><h4>Extra</h4><pre>{{prettyJSON .Extra}}</pre></div>{{end}}{{if and (not (hasData .Context)) (not (hasData .Extra))}}<div class="detail-block muted">No additional data.</div>{{end}}</div>{{end}}
